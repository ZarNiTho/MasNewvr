<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MobileAnswer - Inventory Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 pb-16">

    <div class="max-w-xl mx-auto pt-4 px-4 flex justify-between items-center sticky top-0 bg-[#f1f5f9]/90 backdrop-blur-md z-40 pb-3 border-b border-slate-200">
        <div>
            <h1 class="text-lg font-black text-slate-800 flex items-center gap-2">
                <span class="bg-indigo-100 p-1.5 rounded-lg text-indigo-600">📦</span> Inventory Pro
            </h1>
        </div>
        <div class="flex gap-2">
            <button onclick="window.location.href='repair.html'" class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-3 py-2 rounded-xl text-xs font-bold transition-all shadow-sm">🛠 Repair</button>
            <button onclick="window.location.href='finance.html'" class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-3 py-2 rounded-xl text-xs font-bold transition-all shadow-sm">💰 Finance</button>
            <button onclick="showProductForm()" class="bg-indigo-600 text-white hover:bg-indigo-700 px-3 py-2 rounded-xl text-xs font-bold shadow-md">➕ အသစ်ထည့်မည်</button>
            <button onclick="logout()" class="bg-rose-100 text-rose-600 hover:bg-rose-200 px-3 py-2 rounded-xl text-xs font-bold shadow-sm">ထွက်မည်</button>
        </div>
    </div>

    <main class="max-w-xl mx-auto p-4">
        <div class="bg-gradient-to-r from-indigo-600 to-blue-600 rounded-3xl p-5 shadow-lg text-white mb-5">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[11px] text-indigo-200 font-bold mb-1">ပစ္စည်းလက်ကျန် စုစုပေါင်းတန်ဖိုး</p>
                    <h2 id="totalAssetValue" class="text-2xl font-black">0 Ks</h2>
                </div>
                <div class="text-right">
                    <p class="text-[11px] text-indigo-200 font-bold mb-1">စုစုပေါင်း အရေအတွက်</p>
                    <p id="totalStockCount" class="text-lg font-bold">0 ခု</p>
                </div>
            </div>
        </div>

        <div class="relative mb-4">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span class="text-slate-400">🔍</span></div>
            <input type="text" id="searchInput" onkeyup="renderProducts()" placeholder="ပစ္စည်းအမည် ရှာဖွေရန်..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-medium shadow-sm outline-none focus:border-indigo-400">
        </div>

        <div class="flex gap-2 overflow-x-auto scrollbar-hide mb-5 pb-1" id="filterContainer">
            <button onclick="setFilter('အားလုံး', this)" class="filter-btn active bg-indigo-600 text-white px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">အားလုံး (<span id="count-all">0</span>)</button>
            <button onclick="setFilter('အထွေထွေ', this)" class="filter-btn bg-white text-slate-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">အထွေထွေ (<span id="count-gen">0</span>)</button>
            <button onclick="setFilter('Hardwareအပိုပစ္စည်', this)" class="filter-btn bg-white text-slate-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">HW အပိုပစ္စည်း (<span id="count-hw">0</span>)</button>
            <button onclick="setFilter('accessories', this)" class="filter-btn bg-white text-slate-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">Accessories (<span id="count-acc">0</span>)</button>
            <button onclick="setFilter('ရောင်းပြီး', this)" class="filter-btn bg-white text-rose-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">ရောင်းပြီး (<span id="count-sold">0</span>)</button>
        </div>

        <div id="productList" class="space-y-3"></div>
    </main>

    <script src="firebase-config.js"></script>
    <script src="common.js"></script>
    <script src="inventory.js"></script>

</body>
</html>
