<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MobileAnswer - Repair Tracking</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 pb-16">

    <div class="max-w-xl mx-auto pt-4 px-4 flex justify-between items-center sticky top-0 bg-[#f1f5f9]/90 backdrop-blur-md z-40 pb-3 border-b border-slate-200">
        <div>
            <h1 class="text-lg font-black text-slate-800 flex items-center gap-2">
                <span class="bg-indigo-100 p-1.5 rounded-lg text-indigo-600">🛠️</span> Repair Pro
            </h1>
        </div>
        <div class="flex gap-2">
            <button onclick="window.location.href='main.html'" class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-3 py-2 rounded-xl text-xs font-bold transition-all shadow-sm">📦 Stock</button>
            <button onclick="window.location.href='finance.html'" class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-3 py-2 rounded-xl text-xs font-bold transition-all shadow-sm">💰 Finance</button>
            <button onclick="showRepairForm()" class="bg-indigo-600 text-white hover:bg-indigo-700 px-3 py-2 rounded-xl text-xs font-bold shadow-md">➕ အသစ်အပ်မည်</button>
            <button onclick="logout()" class="bg-rose-100 text-rose-600 hover:bg-rose-200 px-3 py-2 rounded-xl text-xs font-bold shadow-sm">ထွက်မည်</button>
        </div>
    </div>

    <main class="max-w-xl mx-auto p-4">
        <div class="bg-gradient-to-r from-slate-800 to-slate-900 rounded-3xl p-5 shadow-lg text-white mb-5 border border-slate-700">
            <div class="grid grid-cols-3 gap-2 text-center">
                <div>
                    <p class="text-[10px] text-slate-400 font-bold mb-1">အပ်နှံသမျှ စုစုပေါင်း</p>
                    <h2 id="totalReceived" class="text-lg font-black text-indigo-400">0 လုံး</h2>
                </div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold mb-1">ပြင်ဆင်ပြီးစီး</p>
                    <h2 id="totalDone" class="text-lg font-black text-emerald-400">0 လုံး</h2>
                </div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold mb-1">ပြင်ရန်ကျန်ရှိဆဲ</p>
                    <h2 id="totalPending" class="text-lg font-black text-amber-400">0 လုံး</h2>
                </div>
            </div>
        </div>

        <div class="relative mb-4">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span class="text-slate-400">🔍</span></div>
            <input type="text" id="searchInput" onkeyup="renderRepairs()" placeholder="နာမည်၊ ဖုန်းမော်ဒယ် သို့မဟုတ် Voucher ဖြင့်ရှာရန်..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-medium shadow-sm outline-none focus:border-indigo-400">
        </div>

        <div class="flex gap-2 overflow-x-auto scrollbar-hide mb-5 pb-1">
            <button onclick="setRepairFilter('အားလုံး', this)" class="filter-btn bg-indigo-600 text-white px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">အားလုံး</button>
            <button onclick="setRepairFilter('ပြင်ဆင်ဆဲ', this)" class="filter-btn bg-white text-slate-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">ပြင်ဆင်ဆဲ ⏳</button>
            <button onclick="setRepairFilter('ပြီးစီး', this)" class="filter-btn bg-white text-slate-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">ပြီးစီး (ပြင်ပြီး) ✅</button>
            <button onclick="setRepairFilter('အပ်နှံပြီး', this)" class="filter-btn bg-white text-slate-500 border border-slate-200 px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-sm">အပ်နှံပြီး 🤝</button>
        </div>

        <div id="repairList" class="space-y-3"></div>
    </main>

    <script src="firebase-config.js"></script>
    <script src="common.js"></script>
    <script src="repair.js"></script>

</body>
</html>
