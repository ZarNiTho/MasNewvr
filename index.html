<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MobileAnswer - System Login</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen px-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center border border-slate-100 relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500 rounded-full blur-3xl opacity-20"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-500 rounded-full blur-3xl opacity-20"></div>

        <div class="relative z-10">
            <div class="w-20 h-20 mx-auto bg-white rounded-full p-1 border-4 border-indigo-100 shadow-sm mb-4">
                <img src="https://i.postimg.cc/sg5cDCt1/file-0000000001307207a601f81cc1f5617a.png" class="w-full h-full object-cover rounded-full" alt="Logo">
            </div>
            
            <h2 id="authTitle" class="text-xl font-black text-slate-800 mb-1">စနစ်သို့ ဝင်ရောက်ရန်</h2>
            <p class="text-xs text-slate-400 font-bold mb-6">Mobile Answer Workspace</p>

            <div class="space-y-4 text-left">
                
                <div id="userGroup" class="hidden">
                    <label class="text-[11px] font-bold text-slate-500 block mb-1">အသုံးပြုသူအမည် (Username)</label>
                    <input type="text" id="username" placeholder="ဥပမာ - Admin Mg Mg" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-sm outline-none focus:border-indigo-400 focus:bg-white transition-all">
                </div>
                
                <div>
                    <label class="text-[11px] font-bold text-slate-500 block mb-1">အီးမေးလ် (Email)</label>
                    <input type="email" id="email" placeholder="example@mail.com" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-sm outline-none focus:border-indigo-400 focus:bg-white transition-all">
                </div>
                
                <div>
                    <label class="text-[11px] font-bold text-slate-500 block mb-1">စကားဝှက် (Password)</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-sm outline-none focus:border-indigo-400 focus:bg-white transition-all">
                </div>

            </div>

            <button id="authBtn" onclick="handleAuth()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl mt-6 shadow-md shadow-indigo-200 transition-all active:scale-95">
                အကောင့်ဝင်မည်
            </button>

            <div class="mt-6 text-xs text-slate-500 font-medium">
                <span id="toggleLink" onclick="toggleMode()" class="text-indigo-600 font-bold cursor-pointer hover:underline">
                    အကောင့်သစ် ဖန်တီးမည်လား?
                </span>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>

    <script>
        let isLogin = true;

        // အကောင့်ဝင်ထားပြီးသားဆိုပါက main.html သို့ တန်းသွားမည်
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'main.html';
        });

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? "စနစ်သို့ ဝင်ရောက်ရန်" : "အကောင့်သစ် ဖန်တီးရန်";
            document.getElementById('userGroup').style.display = isLogin ? "none" : "block";
            document.getElementById('authBtn').innerText = isLogin ? "အကောင့်ဝင်မည်" : "မှတ်ပုံတင်မည်";
            document.getElementById('toggleLink').innerText = isLogin ? "အကောင့်ရှိပြီးသားလား? ဝင်ရောက်ရန်" : "အကောင့်သစ် ဖန်တီးမည်လား?";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value.trim();

            if (!email || !password || (!isLogin && !username)) {
                return Swal.fire({ icon: 'warning', title: 'လိုအပ်ချက်', text: 'အချက်အလက်အားလုံး ပြည့်စုံအောင်ထည့်ပါ။' });
            }

            const btn = document.getElementById('authBtn');
            btn.innerText = "လုပ်ဆောင်နေပါသည်...";
            btn.disabled = true;

            try {
                if (isLogin) {
                    // Login
                    const cred = await auth.signInWithEmailAndPassword(email, password);
                    await db.collection("users").doc(cred.user.uid).set({ 
                        lastOnline: firebase.firestore.FieldValue.serverTimestamp() 
                    }, { merge: true });
                    
                    await db.collection("activity_logs").add({ 
                        action: `[${cred.user.displayName || email.split('@')[0]}] System Login`, 
                        details: "စနစ်ထဲသို့ ဝင်ရောက်လာပါသည်။", 
                        timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                } else {
                    // Register
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    await cred.user.updateProfile({ displayName: username });
                    
                    await db.collection("users").doc(cred.user.uid).set({
                        username: username,
                        email: email,
                        uid: cred.user.uid,
                        lastOnline: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    await db.collection("activity_logs").add({ 
                        action: `[${username}] New Account`, 
                        details: "အကောင့်အသစ် ဖွင့်လိုက်ပါသည်။", 
                        timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                }
                // အောင်မြင်ပါက onAuthStateChanged က main.html ကို Auto ခေါ်သွားပါမည်။
            } catch (error) {
                let errorMsg = error.message;
                if(error.code === 'auth/invalid-credential') errorMsg = "အီးမေးလ် သို့မဟုတ် စကားဝှက် မှားယွင်းနေပါသည်။";
                if(error.code === 'auth/email-already-in-use') errorMsg = "ဤအီးမေးလ်ဖြင့် အကောင့်ဖွင့်ပြီးသား ဖြစ်နေပါသည်။";
                
                Swal.fire({ icon: 'error', title: 'အမှားအယွင်း', text: errorMsg });
                btn.disabled = false;
                btn.innerText = isLogin ? "အကောင့်ဝင်မည်" : "မှတ်ပုံတင်မည်";
            }
        }
    </script>
</body>
</html>
